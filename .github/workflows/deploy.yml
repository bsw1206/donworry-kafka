name: Django EC2 Deploy

# main 브랜치에 push가 발생할 때 실행
on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH로 EC2에 접속하여 배포 스크립트 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # deploy.yml의 script 부분
          # ... 생략 (host, username, key 설정 부분은 그대로 두세요)
          script: |
            # 1. 프로젝트 폴더로 이동
            cd /home/ubuntu/donworry-kafka
            
            # 2. GitHub 최신 상태로 강제 동기화
            git fetch --all
            git reset --hard origin/master
            
            # 3. 가상환경이 없으면 새로 생성 (프로젝트 폴더 내부에)
            if [ ! -d "venv" ]; then
                python3 -m venv venv
            fi
            
            # 4. 가상환경 안의 pip로 '직접' 설치 (매우 중요)
            ./venv/bin/pip install --upgrade pip
            ./venv/bin/pip install -r requirements.txt
            
            # 5. 가상환경 안의 python으로 '직접' 마이그레이션
            ./venv/bin/python manage.py migratescript: |
            # 1. 프로젝트 폴더로 이동
            cd /home/ubuntu/donworry-kafka
            
            # 2. GitHub 최신 상태로 강제 동기화
            git fetch --all
            git reset --hard origin/master
            
            # 3. 가상환경이 없으면 새로 생성 (프로젝트 폴더 내부에)
            if [ ! -d "venv" ]; then
                python3 -m venv venv
            fi
            
            # 4. 가상환경 안의 pip로 '직접' 설치 (매우 중요)
            ./venv/bin/pip install --upgrade pip
            ./venv/bin/pip install -r requirements.txt
            
            # 5. 가상환경 안의 python으로 '직접' 마이그레이션
            ./venv/bin/python manage.py migrate

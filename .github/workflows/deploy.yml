name: Django EC2 Deploy

# main 브랜치에 push가 발생할 때 실행
on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH로 EC2에 접속하여 배포 스크립트 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # deploy.yml의 script 부분
          script: |
            # 1. 프로젝트 폴더로 이동 (이름 주의: 대소문자까지 똑같이)
            cd /home/ubuntu/model_test_0513
            
            # 2. 최신 코드 가져오기
            git pull origin main
            
            # 3. 가상환경 활성화 (현재 venv가 프로젝트 폴더 '밖'에 있으므로 ../venv 입니다)
            source ../venv/bin/activate
            
            # 4. 패키지 설치 및 DB 반영
            pip install -r requirements.txt
            python manage.py migrate

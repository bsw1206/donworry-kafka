name: Django EC2 Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH로 EC2에 접속하여 배포 스크립트 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. 프로젝트 폴더로 이동
            cd /home/ubuntu/donworry-kafka
            
            # 2. GitHub 최신 상태로 강제 동기화
            git fetch --all
            git reset --hard origin/master
            
            # 3. 가상환경이 없으면 새로 생성 (프로젝트 폴더 내부에)
            if [ ! -d "venv" ]; then
                python3 -m venv venv
            fi
            
            # 4. 가상환경 안의 pip로 패키지 설치
            ./venv/bin/pip install --upgrade pip
            ./venv/bin/pip install -r requirements.txt
            
            # 🎯 [치트키] 명단에 누락되었을 경우를 대비해 에러 났던 패키지들 강제 설치!
            ./venv/bin/pip install Pillow python-dotenv
            
            # 5. 가상환경 안의 python으로 '직접' 마이그레이션
            ./venv/bin/python manage.py migrate
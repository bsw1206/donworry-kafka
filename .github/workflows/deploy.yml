name: Django EC2 Deploy

# main 브랜치에 push가 발생할 때 실행
on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH로 EC2에 접속하여 배포 스크립트 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # deploy.yml의 script 부분
          # ... 생략 (host, username, key 설정 부분은 그대로 두세요)
          script: |
            cd /home/ubuntu/donworry-kafka
            
            # 1. 원격의 최신 정보를 가져옴
            git fetch --all
            
            # 2. 로컬의 변경사항을 무시하고 GitHub의 master 브랜치 상태로 강제 리셋 (강력 추천)
            git reset --hard origin/master
            
            # 3. 가상환경 활성화 및 배포 작업
            source ../venv/bin/activate
            pip install -r requirements.txt
            python manage.py migrate

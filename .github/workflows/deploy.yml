name: Django EC2 Deploy

# main 브랜치에 push가 발생할 때 실행
on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH로 EC2에 접속하여 배포 스크립트 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # deploy.yml의 script 부분
          # ... 생략 (host, username, key 설정 부분은 그대로 두세요)
          script: |
            # 1. 프로젝트 폴더로 이동
            cd /home/ubuntu/donworry-kafka
            
            # 2. GitHub 최신 상태로 강제 동기화
            git fetch --all
            git reset --hard origin/master
            
            # 3. 가상환경의 pip를 직접 사용하여 패키지 설치
            # (가상환경이 /home/ubuntu/venv 에 있다고 가정)
            /home/ubuntu/venv/bin/pip install -r requirements.txt
            
            # 4. 가상환경의 python을 직접 사용하여 DB 반영
            /home/ubuntu/venv/bin/python manage.py migrate
            
            # 5. (선택사항) 서버가 잘 떠있는지 확인하기 위해 정적 파일 모으기
            /home/ubuntu/venv/bin/python manage.py collectstatic --noinput

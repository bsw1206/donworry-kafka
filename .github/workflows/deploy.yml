name: Django EC2 Deploy

# main 브랜치에 push가 발생할 때 실행
on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH로 EC2에 접속하여 배포 스크립트 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # deploy.yml의 script 부분
          # ... 생략 (host, username, key 설정 부분은 그대로 두세요)
          script: |
            # 1. 실제 서버에 있는 폴더명으로 이동 (매우 중요)
            cd /home/ubuntu/donworry-kafka
            
            # 2. 브랜치명을 master로 수정하여 코드 가져오기
            git pull origin master
            
            # 3. 가상환경 활성화 (venv가 밖에 있으므로 ../venv)
            source ../venv/bin/activate
            
            # 4. 패키지 설치 및 DB 반영 (python3, pip3 권장)
            pip install -r requirements.txt
            python manage.py migrate
